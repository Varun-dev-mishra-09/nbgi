version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ngbi
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env.example
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'

  worker:
    build:
      context: ../../backend
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    env_file:
      - ../../backend/.env.example
    depends_on:
      - backend

  user-frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.user
    ports:
      - '3000:3000'

  conductor-frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.conductor
    ports:
      - '3001:3000'

  admin-frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.admin
    ports:
      - '3002:3000'
